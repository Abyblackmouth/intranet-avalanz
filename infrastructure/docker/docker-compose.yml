services:

  # ── Nginx (API Gateway) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: avalanz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - auth-service
      - admin-service
      - upload-service
      - notify-service
      - websocket-service
      - email-service
    networks:
      - avalanz-network

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: avalanz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - avalanz-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: avalanz-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - avalanz-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: avalanz-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - avalanz-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: avalanz-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - avalanz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Consul ──────────────────────────────────────────────────────────────────
  consul:
    image: hashicorp/consul:1.17
    container_name: avalanz-consul
    restart: unless-stopped
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    volumes:
      - consul-data:/consul/data
      - ../consul/consul.json:/consul/config/consul.json:ro
    networks:
      - avalanz-network

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: ../../backend
      dockerfile: auth-service/Dockerfile
    container_name: avalanz-auth
    restart: unless-stopped
    env_file:
      - ../../backend/auth-service/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      CONSUL_HOST: consul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - avalanz-network

  # ── Admin Service ───────────────────────────────────────────────────────────
  admin-service:
    build:
      context: ../../backend
      dockerfile: admin-service/Dockerfile
    container_name: avalanz-admin
    restart: unless-stopped
    env_file:
      - ../../backend/admin-service/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      CONSUL_HOST: consul
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - avalanz-network

  # ── Upload Service ──────────────────────────────────────────────────────────
  upload-service:
    build:
      context: ../../backend
      dockerfile: upload-service/Dockerfile
    container_name: avalanz-upload
    restart: unless-stopped
    env_file:
      - ../../backend/upload-service/.env
    environment:
      STORAGE_ENDPOINT: http://minio:9000
      CONSUL_HOST: consul
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - avalanz-network

  # ── Notify Service ──────────────────────────────────────────────────────────
  notify-service:
    build:
      context: ../../backend
      dockerfile: notify-service/Dockerfile
    container_name: avalanz-notify
    restart: unless-stopped
    env_file:
      - ../../backend/notify-service/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
      CONSUL_HOST: consul
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - avalanz-network

  # ── WebSocket Service ───────────────────────────────────────────────────────
  websocket-service:
    build:
      context: ../../backend
      dockerfile: websocket-service/Dockerfile
    container_name: avalanz-websocket
    restart: unless-stopped
    env_file:
      - ../../backend/websocket-service/.env
    environment:
      CONSUL_HOST: consul
    networks:
      - avalanz-network

  # ── Email Service ───────────────────────────────────────────────────────────
  email-service:
    build:
      context: ../../backend
      dockerfile: email-service/Dockerfile
    container_name: avalanz-email
    restart: unless-stopped
    env_file:
      - ../../backend/email-service/.env
    networks:
      - avalanz-network

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: avalanz-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - avalanz-network

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: avalanz-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: "mailpit:1025"
      GF_SMTP_FROM_ADDRESS: "grafana@avalanz.com"
      GF_SMTP_FROM_NAME: "Grafana Avalanz"
      GF_SMTP_SKIP_VERIFY: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ../grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ../grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ../grafana/avalanz-services-dashboard.json:/var/lib/grafana/dashboards/avalanz-services-dashboard.json:ro
    networks:
      - avalanz-network

  # ── Mailpit ─────────────────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: avalanz-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - avalanz-network

  # ── Postgres Exporter ────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: avalanz-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/postgres?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - avalanz-network

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: avalanz-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - avalanz-network

  # ── Nginx Exporter ───────────────────────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: avalanz-nginx-exporter
    restart: unless-stopped
    command:
      - "--nginx.scrape-uri=http://nginx/nginx_status"
    depends_on:
      - nginx
    networks:
      - avalanz-network

  # ── Cron Jobs ───────────────────────────────────────────────────────────────
  cron:
    build:
      context: ../cron
      dockerfile: Dockerfile
    container_name: avalanz-cron
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_NAME: avalanz_auth
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - cron-backups:/backups
      - cron-logs:/var/log/cron
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - avalanz-network

# ── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
  consul-data:
  prometheus-data:
  grafana-data:
  cron-backups:
  cron-logs:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  avalanz-network:
    driver: bridge
