services:

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    ports:
      - "80:80"

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    environment:
      DEBUG: "False"
      ENV: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Admin Service ───────────────────────────────────────────────────────────
  admin-service:
    environment:
      DEBUG: "False"
      ENV: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Upload Service ──────────────────────────────────────────────────────────
  upload-service:
    environment:
      DEBUG: "False"
      ENV: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Notify Service ──────────────────────────────────────────────────────────
  notify-service:
    environment:
      DEBUG: "False"
      ENV: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── WebSocket Service ───────────────────────────────────────────────────────
  websocket-service:
    environment:
      DEBUG: "False"
      ENV: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Email Service ───────────────────────────────────────────────────────────
  email-service:
    environment:
      DEBUG: "False"
      ENV: production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
      restart_policy:
        condition: on-failure
        max_attempts: 3

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"