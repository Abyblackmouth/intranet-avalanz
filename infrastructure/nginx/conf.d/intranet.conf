upstream auth_service {
    server auth-service:8000;
    keepalive 32;
}

upstream admin_service {
    server admin-service:8000;
    keepalive 32;
}

upstream upload_service {
    server upload-service:8000;
    keepalive 32;
}

upstream notify_service {
    server notify-service:8000;
    keepalive 32;
}

upstream websocket_service {
    server websocket-service:8000;
    keepalive 32;
}

upstream email_service {
    server email-service:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name intranet.avalanz.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Auth Service ──────────────────────────────────────────────────────────
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;
        limit_conn conn_limit 20;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/v1/2fa/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── Admin Service ─────────────────────────────────────────────────────────
    location /api/v1/users/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/v1/companies/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/v1/groups/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/v1/modules/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/v1/roles/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /api/v1/permissions/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://admin_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── Upload Service ────────────────────────────────────────────────────────
    location /api/v1/upload/ {
        limit_req zone=api burst=10 nodelay;
        client_max_body_size 55M;
        proxy_pass http://upload_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Notify Service ────────────────────────────────────────────────────────
    location /api/v1/notifications {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://notify_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── WebSocket Service ─────────────────────────────────────────────────────
    location /ws {
        proxy_pass http://websocket_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Health checks ─────────────────────────────────────────────────────────
    location /health/auth {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    location /health/admin {
        proxy_pass http://admin_service/health;
        proxy_set_header Host $host;
    }

    location /health/upload {
        proxy_pass http://upload_service/health;
        proxy_set_header Host $host;
    }

    location /health/notify {
        proxy_pass http://notify_service/health;
        proxy_set_header Host $host;
    }

    location /health/websocket {
        proxy_pass http://websocket_service/health;
        proxy_set_header Host $host;
    }

    location /health/email {
        proxy_pass http://email_service/health;
        proxy_set_header Host $host;
    }

    # ── Nginx status — usado por nginx-exporter para métricas ─────────────────
    location /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        allow 172.18.0.0/16;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        allow 10.0.0.0/8;
        deny all;
    }

    # ── Frontend Next.js ──────────────────────────────────────────────────────
    #location / {
    #    proxy_pass http://frontend:3000;
    #    proxy_set_header Host $host;
    #    proxy_set_header X-Real-IP $remote_addr;
    #    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #    proxy_set_header X-Forwarded-Proto $scheme;
    #    proxy_connect_timeout 10s;
    #    proxy_read_timeout 30s;
    #}
}
