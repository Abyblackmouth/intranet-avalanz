global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

  external_labels:
    monitor: "avalanz-monitor"
    environment: "production"

# ── Reglas de alerta ──────────────────────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# ── Objetivos de scraping ─────────────────────────────────────────────────────
scrape_configs:

  # Prometheus se monitorea a si mismo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Auth Service
  - job_name: "auth-service"
    static_configs:
      - targets: ["auth-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Admin Service
  - job_name: "admin-service"
    static_configs:
      - targets: ["admin-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Upload Service
  - job_name: "upload-service"
    static_configs:
      - targets: ["upload-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Notify Service
  - job_name: "notify-service"
    static_configs:
      - targets: ["notify-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # WebSocket Service
  - job_name: "websocket-service"
    static_configs:
      - targets: ["websocket-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # Email Service
  - job_name: "email-service"
    static_configs:
      - targets: ["email-service:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  # PostgreSQL — via postgres-exporter (puerto 9187)
  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  # Redis — via redis-exporter (puerto 9121)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s

  # RabbitMQ — expone /metrics nativo en puerto 15692
  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # Nginx — via nginx-prometheus-exporter (puerto 9113)
  - job_name: "nginx"
    static_configs:
      - targets: ["nginx-exporter:9113"]
    scrape_interval: 15s
